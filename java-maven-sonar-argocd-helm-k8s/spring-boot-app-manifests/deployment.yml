apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-app
  labels:
    app: spring-boot-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spring-boot-app
  template:
    metadata:
      labels:
        app: spring-boot-app
    spec:
      containers:
      - name: spring-boot-app
        image: maven:3.9.6-eclipse-temurin-17:replaceImageTag
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
